<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Not Found</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        color: #111;
      }

      .card {
        width: 100%;
        max-width: 500px;
        background: #ffffff;
        padding: 40px 30px;
        border-radius: 16px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 72px;
        line-height: 1;
      }

      p {
        margin: 0 0 24px;
        font-size: 16px;
        line-height: 1.6;
        color: #555;
      }

      a {
        display: inline-block;
        padding: 12px 22px;
        background: #111;
        color: #fff;
        text-decoration: none;
        border-radius: 10px;
        font-size: 15px;
        transition: 0.2s ease;
      }

      a:hover {
        background: #333;
      }

      @media (max-width: 480px) {
        .card {
          padding: 30px 20px;
        }

        h1 {
          font-size: 56px;
        }

        p {
          font-size: 15px;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>404</h1>
      <p>Sorry, the page you are looking for does not exist.</p>
      <a href="/home.html">Go Home</a>
    </div>
  </body>
</html>
