<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audi | Register</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary-container": "#dfe3e5",
              "on-secondary-container": "#616567",
              "surface-container-highest": "#e2e2e2",
              "secondary-fixed": "#dfe3e5",
              "inverse-surface": "#2f3131",
              "surface-dim": "#dadada",
              error: "#ba1a1a",
              "surface-container-high": "#e8e8e8",
              "primary-fixed-dim": "#c6c6c6",
              "on-surface": "#1a1c1c",
              outline: "#7e7576",
              "on-error": "#ffffff",
              "on-secondary-fixed": "#181c1e",
              "on-background": "#1a1c1c",
              "on-tertiary": "#ffffff",
              "tertiary-fixed-dim": "#ffb3b3",
              "error-container": "#ffdad6",
              "on-surface-variant": "#4c4546",
              "surface-container-lowest": "#ffffff",
              "surface-variant": "#e2e2e2",
              "surface-bright": "#f9f9f9",
              "secondary-fixed-dim": "#c3c7c9",
              surface: "#f9f9f9",
              "on-primary-container": "#848484",
              "inverse-primary": "#c6c6c6",
              "surface-tint": "#5e5e5e",
              "primary-fixed": "#e2e2e2",
              background: "#f9f9f9",
              "on-secondary": "#ffffff",
              "on-primary": "#ffffff",
              "outline-variant": "#cfc4c5",
              "on-primary-fixed-variant": "#474747",
              "on-tertiary-fixed-variant": "#920022",
              "surface-container": "#eeeeee",
              "on-error-container": "#93000a",
              "tertiary-container": "#400009",
              "on-tertiary-fixed": "#400009",
              "on-secondary-fixed-variant": "#434749",
              secondary: "#5b5f61",
              primary: "#000000",
              "on-tertiary-container": "#f33d52",
              "primary-container": "#1b1b1b",
              "surface-container-low": "#f3f3f3",
              "inverse-on-surface": "#f1f1f1",
              "tertiary-fixed": "#ffdad9",
              tertiary: "#000000",
              "on-primary-fixed": "#1b1b1b",
            },
            fontFamily: {
              headline: ["Manrope"],
              body: ["Inter"],
              label: ["Inter"],
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem",
            },
          },
        },
      };
    </script>
    <style>
      .glass-header {
        background: rgba(243, 243, 243, 0.8);
        backdrop-filter: blur(24px);
      }
      .social-login-btn {
        transition: all 0.2s ease;
      }
      .social-login-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
      }
      .phone-input {
        direction: ltr;
      }
      .iti {
        width: 100%;
      }
    </style>
    <!-- Phone number library for formatting -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
  </head>
  <body
    class="bg-surface text-on-surface font-body selection:bg-primary selection:text-white min-h-screen flex flex-col"
  >
    <!-- Top Navigation Bar -->
    <header
      class="glass-header sticky top-0 z-50 border-b border-outline-variant/10"
    >
      <nav
        class="container mx-auto px-6 py-4 flex items-center justify-between"
      >
        <div class="flex items-center gap-12">
          <a
            href="index.html"
            class="font-headline text-2xl font-extrabold tracking-tighter"
            >Audi</a
          >
        </div>
        <div class="flex items-center gap-6">
          <a
            class="text-sm font-semibold hover:opacity-70 transition-opacity"
            href="login.html"
            >Login</a
          >
        </div>
      </nav>
    </header>

    <main class="flex-grow flex items-center justify-center py-16">
      <div class="container max-w-md mx-auto px-6">
        <div class="bg-surface-container-lowest p-8 md:p-10 shadow-sm">
          <div class="text-center mb-8">
            <h1 class="font-headline text-3xl font-bold tracking-tight mb-2">
              Create Account
            </h1>
            <p class="text-sm text-on-surface-variant">
              Join the Audi family today
            </p>
          </div>

          <!-- Phone Number Registration -->
          <div class="relative my-8">
            <div class="absolute inset-0 flex items-center">
              <div class="w-full border-t border-outline-variant/30"></div>
            </div>
            <div class="relative flex justify-center text-xs">
              <span
                class="bg-surface-container-lowest px-4 text-on-surface-variant"
                >Input phone number</span
              >
            </div>
          </div>

          <form class="space-y-5">
            <!-- Phone Number Input -->
            <div>
              <label
                class="block text-xs font-bold tracking-widest uppercase mb-2"
                >Phone Number</label
              >
              <input
                type="tel"
                id="phone"
                class="w-full px-4 py-3 border border-outline-variant bg-transparent focus:border-primary focus:ring-0 transition-colors phone-input"
                placeholder="+1 (555) 000-0000"
              />
            </div>

            <!-- Google Sign-In -->
            <button
              class="w-full social-login-btn border border-outline-variant py-4 px-6 flex items-center justify-center gap-3 hover:border-primary transition-colors mb-4"
            >
              <svg class="w-5 h-5" viewBox="0 0 24 24">
                <path
                  fill="#4285F4"
                  d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                />
                <path
                  fill="#34A853"
                  d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                />
                <path
                  fill="#FBBC05"
                  d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                />
                <path
                  fill="#EA4335"
                  d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                />
              </svg>
              <span class="font-medium">Sign up with Google</span>
            </button>

            <div class="flex items-start gap-2">
              <input
                type="checkbox"
                class="mt-1 rounded border-outline-variant text-primary focus:ring-0"
              />
              <span class="text-xs text-on-surface-variant"
                >I agree to the
                <a href="#" class="font-bold text-primary hover:underline"
                  >Terms of Service</a
                >
                and
                <a href="#" class="font-bold text-primary hover:underline"
                  >Privacy Policy</a
                ></span
              >
            </div>

            <button
              type="submit"
              class="w-full bg-primary text-on-primary py-4 font-bold text-sm tracking-widest hover:bg-primary-container transition-colors"
            >
              CREATE ACCOUNT
            </button>
          </form>

          <p class="text-center text-sm text-on-surface-variant mt-8">
            Already have an account?
            <a href="login.html" class="font-bold text-primary hover:underline"
              >Login</a
            >
          </p>
        </div>
      </div>
    </main>

    <!-- Simple Footer -->
    <footer class="bg-surface-container py-8">
      <div
        class="container mx-auto px-6 text-center text-xs text-on-surface-variant"
      >
        © 2024 Audi. All rights reserved.
      </div>
    </footer>

    <!-- Phone Number Initialization Script -->
    <script>
      // Initialize phone number input
      const phoneInput = document.querySelector("#phone");
      if (phoneInput) {
        window.intlTelInput(phoneInput, {
          utilsScript:
            "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js",
          separateDialCode: true,
          preferredCountries: ["us", "gb", "de", "fr", "ca"],
        });
      }
    </script>
  </body>
</html>
