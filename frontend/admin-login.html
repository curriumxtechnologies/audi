<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Audi | Admin Login</title>

    <script>
      try {
        const adminInfo = localStorage.getItem("adminInfo");
        if (adminInfo) {
          window.location.replace("admin-dashboard.html");
        }
      } catch (error) {}
    </script>

    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#000000",
              secondary: "#5b5f61",
              background: "#f7f7f7",
              surface: "#ffffff",
              "surface-soft": "#f1f1f1",
              "surface-deep": "#111111",
              "surface-muted": "#ececec",
              "outline-soft": "#d8d8d8",
              "text-main": "#111111",
              "text-muted": "#666666",
              "text-soft": "#8a8a8a",
              accent: "#d70000",
            },
            fontFamily: {
              headline: ["Manrope", "sans-serif"],
              body: ["Inter", "sans-serif"],
            },
          },
        },
      };
    </script>

    <style>
      body {
        font-family: "Inter", sans-serif;
        background: #f7f7f7;
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(0, 0, 0, 0.05);
      }
    </style>
  </head>

  <body class="bg-background text-text-main">
    <div class="min-h-screen flex items-center justify-center p-6">
      <div class="glass-card max-w-md w-full p-8 md:p-10">
        <div class="text-center mb-8">
          <span class="font-headline text-3xl font-extrabold tracking-tighter">
            Audi
          </span>
          <p class="text-text-muted text-sm mt-2">Admin Portal</p>
        </div>

        <form id="adminLoginForm" class="space-y-6">
          <div>
            <label
              for="email"
              class="block text-sm font-medium text-text-muted mb-2"
            >
              Email
            </label>
            <input
              id="email"
              name="email"
              type="email"
              class="w-full px-4 py-3 border border-outline-soft bg-white focus:border-primary focus:ring-1 focus:ring-primary outline-none transition"
              placeholder="admin@audi.com"
              required
            />
          </div>

          <div>
            <label
              for="password"
              class="block text-sm font-medium text-text-muted mb-2"
            >
              Password
            </label>
            <input
              id="password"
              name="password"
              type="password"
              class="w-full px-4 py-3 border border-outline-soft bg-white focus:border-primary focus:ring-1 focus:ring-primary outline-none transition"
              placeholder="••••••••"
              required
            />
          </div>

          <p
            id="statusMessage"
            class="text-sm min-h-[20px] text-center text-text-muted"
          ></p>

          <button
            id="submitBtn"
            type="submit"
            class="w-full bg-primary text-white py-4 font-semibold text-sm tracking-widest hover:bg-neutral-800 transition-colors flex items-center justify-center gap-2"
          >
            <span id="submitText">ACCESS DASHBOARD</span>
            <span class="material-symbols-outlined text-[18px]">
              admin_panel_settings
            </span>
          </button>
        </form>
      </div>
    </div>

    <script>
      const BACKEND_URL =
        window.location.hostname === "localhost"
          ? "http://localhost:8000"
          : "https://audi-t4lu.onrender.com";

      const adminLoginForm = document.getElementById("adminLoginForm");
      const emailInput = document.getElementById("email");
      const passwordInput = document.getElementById("password");
      const statusMessage = document.getElementById("statusMessage");
      const submitBtn = document.getElementById("submitBtn");
      const submitText = document.getElementById("submitText");

      function setStatus(message, isError = false) {
        statusMessage.textContent = message;
        statusMessage.className = isError
          ? "text-sm min-h-[20px] text-center text-red-600"
          : "text-sm min-h-[20px] text-center text-text-muted";
      }

      function setLoading(isLoading) {
        submitBtn.disabled = isLoading;

        if (isLoading) {
          submitBtn.classList.add("opacity-70", "cursor-not-allowed");
          submitText.textContent = "PLEASE WAIT...";
        } else {
          submitBtn.classList.remove("opacity-70", "cursor-not-allowed");
          submitText.textContent = "ACCESS DASHBOARD";
        }
      }

      async function loginAdmin(email, password) {
        const response = await fetch(`${BACKEND_URL}/api/admin/login`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          credentials: "include",
          body: JSON.stringify({
            email,
            password,
          }),
        });

        let data = {};
        try {
          data = await response.json();
        } catch (error) {}

        if (!response.ok) {
          throw new Error(data.message || "Login failed");
        }

        return data;
      }

      async function checkBackend() {
        const response = await fetch(`${BACKEND_URL}/api/health`);
        if (!response.ok) {
          throw new Error("Backend is unreachable");
        }
      }

      window.addEventListener("load", async function () {
        try {
          await checkBackend();
          setStatus("Backend connected.");
        } catch (error) {
          setStatus(
            "Cannot reach backend. Make sure server is running on localhost:8000",
            true,
          );
        }
      });

      adminLoginForm.addEventListener("submit", async function (e) {
        e.preventDefault();

        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();

        if (!email || !password) {
          setStatus("Please enter email and password.", true);
          return;
        }

        try {
          setLoading(true);
          setStatus("Signing in...");

          const adminData = await loginAdmin(email, password);

          localStorage.setItem("adminInfo", JSON.stringify(adminData));

          setStatus("Login successful. Redirecting...");
          setTimeout(() => {
            window.location.href = "admin-dashboard.html";
          }, 700);
        } catch (error) {
          console.error("Admin login error:", error);
          setStatus(error.message || "Login failed", true);
          setLoading(false);
        }
      });
    </script>
  </body>
</html>
